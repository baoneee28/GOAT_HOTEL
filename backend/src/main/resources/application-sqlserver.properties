# ==========================================
# Cấu hình kết nối SQL Server
# Cách dùng: Đổi tên file này thành application.properties
#            (hoặc chạy với tham số: --spring.profiles.active=sqlserver)
# ==========================================

# Thay "localhost" nếu SQL Server của bạn ở máy khác
# Thay "goat_hotel" nếu bạn đặt tên database khác trong file .sql
# ⚠️ Dùng Windows Authentication (theo cấu hình SSMS trong ảnh)
spring.datasource.url=jdbc:sqlserver://MRHOANG\\SQLEXPRESS;databaseName=goat_hotel;integratedSecurity=true;encrypt=true;trustServerCertificate=true
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==========================================
# JPA / Hibernate dialect cho SQL Server
# ==========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=true

# ==========================================
# Server
# ==========================================
server.port=8080

# ==========================================
# Thymeleaf
# ==========================================
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ==========================================
# File Upload
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload directory
app.upload.dir=src/main/resources/static/uploads/

# ==========================================
# Session
# ==========================================
server.servlet.session.timeout=3600
