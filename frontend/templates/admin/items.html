<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý vật phẩm - GOAT HOTEL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        :root { --primary-color: #4e31aa; --bg-admin: #f8faff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-admin); }
        .main-wrapper { margin-left: 280px; padding: 40px; }
        .card-table { background: white; border-radius: 24px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.03); overflow: hidden; }
        .table thead th { background: #f8f9fa; color: #6c757d; padding: 15px 25px; border: none; }
        .table tbody td { padding: 15px 25px; vertical-align: middle; border-bottom: 1px solid #f0f0f0; }
        .item-icon-img { width: 40px; height: 40px; object-fit: contain; }
        .btn-action { width: 35px; height: 35px; border-radius: 8px; border: none; transition: 0.2s; }
        .btn-edit { background: #e0e7ff; color: var(--primary-color); }
        .btn-delete { background: #fee2e2; color: #dc2626; }
        .pagination .page-link { border: none; border-radius: 8px; margin: 0 3px; color: var(--primary-color); font-weight: 600; }
        .pagination .active .page-link { background: var(--primary-color); color: white; }
    </style>
</head>
<body>

<div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

<div class="main-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1">Quản lý vật phẩm</h2>
            <p class="text-muted mb-0">Quản lý các tiện ích đi kèm phòng</p>
        </div>
        <button class="btn btn-primary px-4 py-2 rounded-3 fw-bold" style="background: var(--primary-color); border: none;" onclick="openModal()">
            + Thêm vật phẩm
        </button>
    </div>

    <div class="card-table">
        <div class="p-4 border-bottom">
            <form method="GET" th:action="@{/admin/items}" style="max-width: 400px;">
                <input type="text" name="q" class="form-control rounded-3" placeholder="Tìm tên vật phẩm..." th:value="${search}">
            </form>
        </div>

        <div class="table-responsive">
            <table class="table mb-0">
                <thead>
                    <tr>
                        <th width="100">Icon</th>
                        <th>Tên vật phẩm</th>
                        <th>Đường dẫn ảnh (URL)</th>
                        <th class="text-end">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="i : ${items}">
                        <td>
                            <img th:src="${i.image}" class="item-icon-img" onerror="this.src='https://via.placeholder.com/40'">
                        </td>
                        <td class="fw-bold" th:text="${i.name}"></td>
                        <td class="text-muted small" th:text="${i.image}"></td>
                        <td class="text-end">
                            <button class="btn-action btn-edit me-1" th:attr="onclick=|editItem(${i.id}, '${#strings.escapeJavaScript(i.name)}', '${#strings.escapeJavaScript(i.image)}')|">✎</button>
                            <button class="btn-action btn-delete" th:attr="onclick=|deleteItem(${i.id})|">🗑</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${totalPages > 1}" class="p-4 d-flex justify-content-end">
            <nav><ul class="pagination mb-0">
                <li th:each="p : ${#numbers.sequence(1, totalPages)}" th:class="${p == currentPage ? 'page-item active' : 'page-item'}">
                    <a class="page-link" th:href="@{/admin/items(page=${p}, q=${search})}" th:text="${p}">1</a>
                </li>
            </ul></nav>
        </div>
    </div>
</div>

<div class="modal fade" id="itemModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 24px; border: none;">
            <div class="modal-header border-0 p-4 pb-0">
                <h5 class="fw-bold" id="modalTitle">Vật phẩm</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form method="POST" id="itemForm" th:action="@{/admin/items}">
                    <input type="hidden" name="action" value="save">
                    <input type="hidden" name="item_id" id="itemId">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên vật phẩm</label>
                        <input type="text" name="name" id="itemName" class="form-control rounded-3" placeholder="VD: Tivi, Điều hòa..." required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Đường dẫn Icon (URL)</label>
                        <input type="text" name="image" id="itemImage" class="form-control rounded-3" placeholder="https://..." required>
                        <div class="form-text">Dán link ảnh từ Flaticon hoặc các nguồn khác.</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" style="background: var(--primary-color); border: none; border-radius: 12px;">Lưu vật phẩm</button>
                </form>
            </div>
        </div>
    </div>
</div>

<form id="delForm" th:action="@{/admin/items}" method="POST" style="display:none;">
    <input type="hidden" name="action" value="delete">
    <input type="hidden" name="id" id="delId">
</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const modal = new bootstrap.Modal(document.getElementById('itemModal'));

    function openModal() {
        document.getElementById('modalTitle').innerText = 'Thêm vật phẩm mới';
        document.getElementById('itemForm').reset();
        document.getElementById('itemId').value = '';
        modal.show();
    }

    function editItem(id, name, image) {
        document.getElementById('modalTitle').innerText = 'Sửa vật phẩm';
        document.getElementById('itemId').value = id;
        document.getElementById('itemName').value = name;
        document.getElementById('itemImage').value = image;
        modal.show();
    }

    function deleteItem(id) {
        Swal.fire({
            title: 'Xác nhận xóa?',
            text: "Dữ liệu vật phẩm này sẽ bị xóa vĩnh viễn!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc2626',
            confirmButtonText: 'Xóa ngay',
            cancelButtonText: 'Hủy'
        }).then((result) => {
            if (result.isConfirmed) {
                document.getElementById('delId').value = id;
                document.getElementById('delForm').submit();
            }
        })
    }
</script>
<script th:inline="javascript">
    /*[# th:if="${message != null}"]*/
    Swal.fire({ icon: 'success', title: 'Thành công', text: /*[[${message}]]*/ '', timer: 1500, showConfirmButton: false });
    /*[/]*/
    /*[# th:if="${error != null}"]*/
    Swal.fire({ icon: 'error', title: 'Lỗi', text: /*[[${error}]]*/ '' });
    /*[/]*/
</script>
</body>
</html>
