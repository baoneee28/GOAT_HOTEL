<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOAT HOTEL - Trải nghiệm nghỉ dưỡng đẳng cấp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-color: #4e31aa;
            --secondary-color: #8b5cf6;
            --accent-color: #f7a400;
            --bg-body: #f8faff;
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95);
            padding: 18px 0;
            box-shadow: 0 4px 30px rgba(0,0,0,0.03);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .navbar-brand {
            color: var(--primary-color) !important;
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-link {
            color: #64748b !important;
            font-weight: 600;
            padding: 8px 20px !important;
            transition: all 0.3s ease;
            border-radius: 50px;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--primary-color) !important;
            background: rgba(78, 49, 170, 0.05);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white !important;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(78, 49, 170, 0.2);
            transition: all 0.3s ease;
            border: none;
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(78, 49, 170, 0.3);
            background: linear-gradient(135deg, #3c2586 0%, #7c3aed 100%);
        }

        .user-avatar-nav {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #e0e7ff;
            transition: 0.2s;
        }

        .user-avatar-nav:hover {
            border-color: var(--primary-color);
            transform: scale(1.05);
        }

        .user-dropdown {
            position: relative;
        }

        .user-dropdown .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 120%;
            border: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border-radius: 20px;
            padding: 15px;
            min-width: 220px;
            animation: fadeIn 0.2s cubic-bezier(0.165, 0.84, 0.44, 1);
            background: #fff;
        }

        .user-dropdown:hover .dropdown-menu {
            display: block;
            top: 100%;
        }

        .dropdown-item {
            border-radius: 12px;
            padding: 12px 15px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #475569;
            transition: 0.2s;
        }

        .dropdown-item:hover {
            background: #f1f5f9;
            color: var(--primary-color);
            transform: translateX(5px);
        }

        .dropdown-divider {
            margin: 10px 0;
            border-top: 1px solid #f1f5f9;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
</head>
<body>


<nav class="navbar navbar-expand-lg sticky-top" th:fragment="navbar">
    <div class="container">
        
        <a class="navbar-brand" th:href="@{/}">GOAT HOTEL</a>

        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto align-items-center">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Trang chủ</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/#booking-section}">Đặt phòng</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/#newsCarousel}">Tin tức</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/#footer}">Liên hệ</a></li>
            </ul>

            <ul class="navbar-nav align-items-center mt-3 mt-lg-0">
                
                <li th:if="${session.user != null}" class="nav-item user-dropdown ms-lg-3">
                    <a class="nav-link p-0 d-flex align-items-center gap-3" href="#" role="button">
                        <span class="text-end d-none d-lg-block">
                            <small class="d-block text-muted" style="font-size: 0.75rem; line-height: 1;">Xin chào,</small>
                            
                            <span class="fw-bold text-dark" th:text="${session.user.fullName}">Khách</span>
                        </span>
                        
                        <img th:if="${session.user.image != null and !session.user.image.isEmpty()}"
                             th:src="@{/uploads/} + ${session.user.image}"
                             class="user-avatar-nav" alt="avatar">
                        <img th:unless="${session.user.image != null and !session.user.image.isEmpty()}"
                             th:src="@{'https://ui-avatars.com/api/?background=4e31aa&color=fff&size=128&name=' + ${session.user.fullName}}"
                             class="user-avatar-nav" alt="avatar">
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/profile}">👤 Hồ sơ cá nhân</a></li>
                        <li><a class="dropdown-item" th:href="@{/history}">📅 Lịch sử đặt phòng</a></li>
                        
                        <th:block th:if="${session.user.role == 'admin'}">
                            <li><div class="dropdown-divider"></div></li>
                            <li><a class="dropdown-item text-primary" th:href="@{/admin}">⚡ Trang quản trị</a></li>
                        </th:block>
                        <li><div class="dropdown-divider"></div></li>
                        
                        <li><a class="dropdown-item text-danger" th:href="@{/logout}">🚪 Đăng xuất</a></li>
                    </ul>
                </li>
                
                <li th:unless="${session.user != null}" class="nav-item ms-lg-3">
                    <a th:href="@{/login}" class="btn btn-login nav-link text-white">Đăng nhập</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
