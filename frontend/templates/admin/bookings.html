<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị đặt phòng - GOAT HOTEL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">
    
    <style>
        :root { --primary-color: #4e31aa; --bg-admin: #f8faff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-admin); }
        .main-wrapper { margin-left: 280px; padding: 40px; }
        .card-table { background: white; border-radius: 24px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.03); overflow: hidden; }
        .st-badge { padding: 5px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .st-confirmed { background: #e0f2fe; color: #0369a1; }
        .st-pending { background: #fef3c7; color: #92400e; }
        .st-completed { background: #dcfce7; color: #166534; }
        .st-cancelled { background: #fee2e2; color: #991b1b; }
        .table td { padding: 18px 25px; vertical-align: middle; border-bottom: 1px solid #f4f4f4; }
        .btn-check-action { width: 34px; height: 34px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; border: none; transition: 0.2s; }
        .btn-check-early { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; }
        .btn-check-early:hover { background: #ea580c; color: white; }
        .btn-check-now { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        .btn-check-now:hover { background: #16a34a; color: white; }
        .flatpickr-input { background-color: white !important; border: 1px solid #e2e8f0; border-radius: 12px; height: 50px; padding: 0 15px; font-weight: 600; }
        .date-group { position: relative; }
        .date-icon { position: absolute; right: 15px; top: 42px; color: #94a3b8; pointer-events: none; }
        
        /* Invoice CSS */
        .invoice-box { padding: 20px; border: 1px solid #eee; border-radius: 16px; background: #fff; }
        .invoice-header { border-bottom: 2px dashed #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .invoice-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.95rem; }
        .invoice-total { border-top: 2px solid #eee; padding-top: 15px; margin-top: 15px; font-size: 1.2rem; font-weight: 800; color: var(--primary-color); }
    </style>
</head>
<body>

<div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

<div class="main-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1">Quản lý đặt phòng</h2>
            <p class="text-muted mb-0">Hệ thống tính tiền tự động theo giờ</p>
        </div>
        <button class="btn btn-primary px-4 py-2 rounded-3 fw-bold" style="background: var(--primary-color); border:none;" onclick="openModal()">+ Tạo đơn mới</button>
    </div>

    <div class="card-table">
        <div class="p-4 border-bottom d-flex gap-2">
            
            <a th:href="@{/admin/bookings}" th:class="${filter == null or filter == '' ? 'btn btn-sm btn-dark rounded-pill px-3' : 'btn btn-sm btn-light border rounded-pill px-3'}">Tất cả</a>
            <a th:href="@{/admin/bookings(status='pending')}" th:class="${filter == 'pending' ? 'btn btn-sm btn-dark rounded-pill px-3' : 'btn btn-sm btn-light border rounded-pill px-3'}">Chờ duyệt</a>
            <a th:href="@{/admin/bookings(status='confirmed')}" th:class="${filter == 'confirmed' ? 'btn btn-sm btn-dark rounded-pill px-3' : 'btn btn-sm btn-light border rounded-pill px-3'}">Đã đặt</a>
            <a th:href="@{/admin/bookings(status='completed')}" th:class="${filter == 'completed' ? 'btn btn-sm btn-dark rounded-pill px-3' : 'btn btn-sm btn-light border rounded-pill px-3'}">Hoàn thành</a>
            <a th:href="@{/admin/bookings(status='cancelled')}" th:class="${filter == 'cancelled' ? 'btn btn-sm btn-dark rounded-pill px-3' : 'btn btn-sm btn-light border rounded-pill px-3'}">Đã hủy</a>
        </div>

        <div class="table-responsive">
            <table class="table mb-0">
                <thead>
                    <tr>
                        <th>Khách hàng</th>
                        <th>Phòng &amp; Giá</th>
                        <th>Thời gian thuê</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th class="text-end">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${bookings}">
                        <td class="fw-bold" th:text="${b.user.fullName}">Ten</td>
                        <td>
                            <div class="fw-bold text-primary">Phòng <span th:text="${b.room.roomNumber}">0</span></div>
                            <small class="text-muted"><span th:text="${#numbers.formatInteger(b.room.roomType.pricePerNight, 1, 'COMMA')}">0</span>đ/ngày</small>
                        </td>
                        <td class="small">
                            <div class="d-flex align-items-center mb-1"><span style="width: 30px;" class="text-muted">In:</span> <b th:text="${#temporals.format(b.checkIn, 'HH:mm dd/MM')}">00:00</b></div>
                            <div class="d-flex align-items-center"><span style="width: 30px;" class="text-muted">Out:</span> <b th:text="${#temporals.format(b.checkOut, 'HH:mm dd/MM')}">00:00</b></div>
                        </td>
                        <td class="fw-bold text-primary">
                            <span th:text="${#numbers.formatInteger(b.totalPrice, 1, 'COMMA')}">0</span>đ<br>
                            <small class="text-dark fw-normal"><span th:text="${b.totalHours}">0</span>h</small>
                        </td>
                        <td><span th:class="'st-badge st-' + ${b.status}" th:text="${b.status}">status</span></td>
                        <td class="text-end">
                            <th:block th:if="${b.status == 'confirmed' || b.status == 'pending'}">
                                
                                <button class="btn-check-action btn-check-early me-1"
                                        title="Chấm trả phòng"
                                        th:attr="onclick=|handleCheckout(${b.id}, '${#temporals.format(b.checkOut, 'yyyy-MM-dd HH:mm:ss')}', ${b.totalPrice}, ${b.room.roomType.pricePerNight})|">
                                    ⚡
                                </button>
                            </th:block>
                            
                            <th:block th:if="${b.status == 'completed'}">
                                <button class="btn btn-sm btn-light text-info me-1" th:attr="onclick=|viewInvoice(${b.id}, '${b.user.fullName}', '${b.room.roomNumber}', '${b.room.roomType.typeName}', '${#temporals.format(b.checkIn, 'yyyy-MM-dd HH:mm:ss')}', '${#temporals.format(b.checkOut, 'yyyy-MM-dd HH:mm:ss')}', ${b.totalPrice}, ${b.room.roomType.pricePerNight}, ${b.totalHours})|" title="Xem hóa đơn">👁</button>
                            </th:block>
                            <th:block th:unless="${b.status == 'completed'}">
                                <button class="btn btn-sm btn-light text-primary me-1" th:attr="onclick=|editBooking(${b.id}, ${b.user.id}, ${b.room.id}, '${b.room.roomNumber}', '${#temporals.format(b.checkIn, 'yyyy-MM-dd HH:mm')}', '${#temporals.format(b.checkOut, 'yyyy-MM-dd HH:mm')}', '${b.status}')|">✎</button>
                            </th:block>
                            
                            <button class="btn btn-sm btn-light text-danger" th:attr="onclick=|deleteBooking(${b.id})|">🗑</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${totalPages > 1}" class="p-4 d-flex justify-content-end border-top">
            <nav><ul class="pagination mb-0">
                <li th:each="i : ${#numbers.sequence(1, totalPages)}" th:class="${i == currentPage ? 'page-item active' : 'page-item'}">
                    <a class="page-link" th:href="@{/admin/bookings(page=${i}, status=${filter})}" th:text="${i}">1</a>
                </li>
            </ul></nav>
        </div>
    </div>
</div>


<div class="modal fade" id="bookingModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 24px; border:none;">
            <div class="modal-header border-0 p-4 pb-0">
                <h5 class="fw-bold" id="modalTitle">Đơn đặt phòng</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form method="POST" id="bookingForm" th:action="@{/admin/bookings}">
                    <input type="hidden" name="action" value="save">
                    <input type="hidden" name="booking_id" id="bookingId">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted text-uppercase">Khách hàng</label>
                        <select name="user_id" id="bookUser" class="form-select rounded-3" style="height: 50px;" required>
                            <option th:each="u : ${allUsers}" th:value="${u.id}" th:text="${u.fullName}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted text-uppercase">Phòng trống</label>
                        <select name="room_id" id="bookRoom" class="form-select rounded-3" style="height: 50px;" required>
                            <option value="" id="editRoomPlaceholder" disabled hidden>-- Chọn phòng --</option>
                            <option th:each="r : ${availableRooms}" th:value="${r.id}" th:text="'Phòng ' + ${r.roomNumber}"></option>
                        </select>
                    </div>

                    <div class="row mb-3 g-3">
                        <div class="col-6">
                            <div class="date-group">
                                <label>Giờ Check-in</label>
                                <input type="text" name="check_in" id="bookIn" class="form-control" required>
                                <span class="date-icon">📅</span>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="date-group">
                                <label>Giờ Check-out</label>
                                <input type="text" name="check_out" id="bookOut" class="form-control" required>
                                <span class="date-icon">📅</span>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold small text-muted text-uppercase">Trạng thái</label>
                        <select name="status" id="bookStatus" class="form-select rounded-3" style="height: 50px;">
                            <option value="pending">Đang chờ</option>
                            <option value="confirmed">Đã xác nhận</option>
                            <option value="completed">Đã hoàn thành</option>
                            <option value="cancelled">Đã hủy</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm" style="background: var(--primary-color); border:none; border-radius:12px;">Lưu Đơn Hàng</button>
                </form>
            </div>
        </div>
    </div>
</div>


<div class="modal fade" id="invoiceModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 24px; border:none;">
            <div class="modal-header border-0 p-4 pb-0">
                <h5 class="fw-bold text-uppercase text-primary">Chi tiết hóa đơn</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="invoice-box" id="invoiceContent">
                </div>
                <button class="btn btn-dark w-100 mt-3 rounded-pill" onclick="window.print()">🖨 In hóa đơn</button>
            </div>
        </div>
    </div>
</div>

<form id="delForm" th:action="@{/admin/bookings}" method="POST" style="display:none;">
    <input type="hidden" name="action" value="delete">
    <input type="hidden" name="booking_id" id="delId">
</form>

<form id="checkoutForm" th:action="@{/admin/bookings}" method="POST" style="display:none;">
    <input type="hidden" name="action" value="checkout">
    <input type="hidden" name="booking_id" id="checkoutId">
    <input type="hidden" name="checkout_type" id="checkoutType">
</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    const modal = new bootstrap.Modal(document.getElementById('bookingModal'));
    const invoiceModal = new bootstrap.Modal(document.getElementById('invoiceModal'));
    const fpConfig = { enableTime: true, dateFormat: "Y-m-d H:i", time_24hr: true, minuteIncrement: 1 };
    const fpIn = flatpickr("#bookIn", { ...fpConfig, defaultDate: new Date() });
    const fpOut = flatpickr("#bookOut", { ...fpConfig });

    function openModal() {
        document.getElementById('modalTitle').innerText = 'Tạo đơn mới';
        document.getElementById('bookingForm').reset();
        document.getElementById('bookingId').value = '';
        document.getElementById('editRoomPlaceholder').style.display = 'block';
        fpIn.setDate(new Date());
        fpOut.clear();
        modal.show();
    }

    function editBooking(id, user_id, room_id, room_number, check_in, check_out, status) {
        document.getElementById('modalTitle').innerText = 'Sửa đơn: #' + id;
        document.getElementById('bookingId').value = id;
        document.getElementById('bookUser').value = user_id;
        const roomSelect = document.getElementById('bookRoom');
        const exists = Array.from(roomSelect.options).some(opt => opt.value == room_id);
        if(!exists) {
            const newOpt = new Option("Phòng " + room_number + " (Hiện tại)", room_id, true, true);
            roomSelect.add(newOpt);
        }
        roomSelect.value = room_id;
        fpIn.setDate(check_in);
        fpOut.setDate(check_out);
        document.getElementById('bookStatus').value = status;
        modal.show();
    }

    function viewInvoice(id, full_name, room_number, type_name, check_in, check_out, total_price, price_per_night, total_hours) {
        const priceFmt = new Intl.NumberFormat('vi-VN').format(total_price);
        const pricePerNightFmt = new Intl.NumberFormat('vi-VN').format(price_per_night);
        const pricePerHourFmt = new Intl.NumberFormat('vi-VN').format(Math.round(price_per_night/24));

        const html = `
            <div class="invoice-header text-center">
                <h3 class="fw-bold">GOAT HOTEL</h3>
                <div class="text-muted small">Mã đơn: #${id}</div>
                <div class="text-muted small">${new Date().toLocaleString('vi-VN')}</div>
            </div>
            
            <div class="invoice-row"><span class="text-muted">Khách hàng:</span> <span class="fw-bold">${full_name}</span></div>
            <div class="invoice-row"><span class="text-muted">Phòng:</span> <span class="fw-bold">${room_number} (${type_name})</span></div>
            <div class="invoice-row mt-3"><span class="text-muted">Giờ vào:</span> <span>${check_in}</span></div>
            <div class="invoice-row"><span class="text-muted">Giờ ra:</span> <span>${check_out}</span></div>
            
            <div class="border-top my-3 pt-3">
                <div class="invoice-row">
                    <span>Đơn giá phòng</span>
                    <span>${pricePerNightFmt}đ /ngày</span>
                </div>
                 <div class="invoice-row">
                    <span>(Đơn giá giờ)</span>
                    <span class="text-muted small">~${pricePerHourFmt}đ /h</span>
                </div>
                <div class="invoice-row">
                    <span>Thời gian sử dụng</span>
                    <span>${total_hours} giờ</span>
                </div>
            </div>

            <div class="invoice-total d-flex justify-content-between">
                <span>TỔNG CỘNG</span>
                <span>${priceFmt} VNĐ</span>
            </div>
            <div class="text-center mt-3 text-success fw-bold text-uppercase small border p-1 rounded bg-light">
                Đã thanh toán
            </div>
        `;
        document.getElementById('invoiceContent').innerHTML = html;
        invoiceModal.show();
    }

    function handleCheckout(id, checkoutStr, bookedPrice, pricePerNight) {
        const checkOutDate = new Date(checkoutStr);
        const now = new Date();
        if(now < checkOutDate) {
            // is_early
            const diffMs = now - (new Date(checkoutStr)); // actually diff from checkin in original, we mock it by calculating from flat price per night
            const actualPrice = "Tính lại (thực tế)";
            checkoutEarly(id, new Intl.NumberFormat('vi-VN').format(bookedPrice), actualPrice, "?");
        } else {
            checkoutNow(id);
        }
    }

    function checkoutNow(id) {
        Swal.fire({
            title: 'Xác nhận trả phòng?',
            text: "Đơn hàng sẽ chuyển sang trạng thái hoàn thành.",
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'Đồng ý',
            confirmButtonColor: '#16a34a'
        }).then((res) => {
            if (res.isConfirmed) {
                document.getElementById('checkoutId').value = id;
                document.getElementById('checkoutType').value = 'normal';
                document.getElementById('checkoutForm').submit();
            }
        });
    }

    function checkoutEarly(id, bookedPriceStr, actualPriceStr, actualHours) {
        Swal.fire({
            title: 'Khách trả phòng sớm!',
            html: `
                <div class="text-start p-3 bg-light rounded-3 mb-3">
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="radio" name="checkoutOpt" id="opt1" value="keep" checked>
                        <label class="form-check-label fw-bold" for="opt1">
                            Thanh toán theo giá đã đặt
                            <div class="text-primary">${bookedPriceStr}đ</div>
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="checkoutOpt" id="opt2" value="recalc">
                        <label class="form-check-label fw-bold" for="opt2">
                            Tính lại theo thời gian thực (hệ thống)
                            <div class="text-danger"></div>
                        </label>
                    </div>
                </div>
            `,
            icon: 'info',
            showCancelButton: true,
            confirmButtonText: 'Xác nhận trả phòng',
            confirmButtonColor: '#ea580c',
            preConfirm: () => {
                return document.querySelector('input[name="checkoutOpt"]:checked').value;
            }
        }).then((res) => {
            if (res.isConfirmed) {
                document.getElementById('checkoutId').value = id;
                document.getElementById('checkoutType').value = res.value;
                document.getElementById('checkoutForm').submit();
            }
        });
    }

    function deleteBooking(id) {
        Swal.fire({
            title: 'Xóa đơn này?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc2626',
            confirmButtonText: 'Xóa ngay'
        }).then((res) => {
            if (res.isConfirmed) {
                document.getElementById('delId').value = id;
                document.getElementById('delForm').submit();
            }
        });
    }

</script>
<script th:inline="javascript">
    /*[# th:if="${message != null}"]*/
    Swal.fire({ icon: 'success', title: 'Thành công', text: /*[[${message}]]*/ '', timer: 1500, showConfirmButton: false });
    /*[/]*/
    /*[# th:if="${error != null}"]*/
    Swal.fire({ icon: 'error', title: 'Lỗi', text: /*[[${error}]]*/ '' });
    /*[/]*/
</script>
</body>
</html>
