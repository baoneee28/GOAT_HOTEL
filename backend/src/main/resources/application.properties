# ==========================================
# Database Configuration - SQL Server Authentication
# ⚠️ Bật SQL Server Auth trước: xem hướng dẫn bên dưới
spring.datasource.url=jdbc:sqlserver://localhost;databaseName=goat_hotel;integratedSecurity=true;encrypt=true;trustServerCertificate=true

# ==========================================
# JPA / Hibernate (SQL Server)
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=true

# ==========================================
# Server
# ==========================================
server.port=8080

# ==========================================
# Thymeleaf
# ==========================================
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ==========================================
# File Upload (thay the PHP move_uploaded_file)
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# CẤU HÌNH UPLOADS
# ==========================================
spring.thymeleaf.prefix=file:../frontend/templates/
spring.thymeleaf.cache=false

# Upload directory trong backend static (service sẽ tự resolve đúng nếu app chạy từ repo root)
app.upload.dir=src/main/resources/static/uploads/

# ==========================================
# Session (tuong duong PHP session)
# ==========================================
server.servlet.session.timeout=3600

# ==========================================
# BOOKING HOLD (LOCAL DEMO)
# ==========================================
# Dong bo giu cho booking pending va luong VNPay demo cung 1 chuan.
# Booking pending co hieu luc 180 giay (3 phut) de de demo va de giai thich.
booking.pending-hold-seconds=120
booking.deposit-ratio=0.3

# ==========================================
# DEBUG ERRORS
# ==========================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true

