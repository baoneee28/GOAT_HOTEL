<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý người dùng - GOAT HOTEL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        :root { --primary-color: #4e31aa; --bg-admin: #f8faff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-admin); }
        .main-wrapper { margin-left: 280px; padding: 40px; }
        .card-table { background: white; border-radius: 24px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.03); overflow: hidden; }
        .user-avatar { width: 45px; height: 45px; object-fit: cover; border-radius: 50%; border: 2px solid #eee; }
        .table tbody td { padding: 15px 25px; vertical-align: middle; border-bottom: 1px solid #f0f0f0; }
        .badge-role { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .role-admin { background: #fee2e2; color: #dc2626; }
        .role-customer { background: #e0e7ff; color: #4e31aa; }
        .btn-action { width: 32px; height: 32px; border-radius: 8px; border: none; font-size: 14px; }
        .pagination .page-link { border: none; border-radius: 8px; margin: 0 3px; color: var(--primary-color); }
        .pagination .active .page-link { background: var(--primary-color); color: white; }
    </style>
</head>
<body>

<div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

<div class="main-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1">Quản lý người dùng</h2>
            <p class="text-muted mb-0">Danh sách tài khoản khách hàng và nhân viên</p>
        </div>
        <button class="btn btn-primary px-4 py-2 rounded-3 fw-bold" style="background: var(--primary-color); border: none;" onclick="openModal()">
            + Thêm tài khoản
        </button>
    </div>

    <div class="card-table">
        <div class="p-4 border-bottom">
            <form method="GET" th:action="@{/admin/users}" style="max-width: 350px;">
                <input type="text" name="q" class="form-control rounded-pill px-4" placeholder="Tìm tên hoặc email..." th:value="${search}">
            </form>
        </div>

        <div class="table-responsive">
            <table class="table mb-0">
                <thead class="bg-light">
                    <tr>
                        <th>Người dùng</th>
                        <th>Email</th>
                        <th>Điện thoại</th>
                        <th>Vai trò</th>
                        <th class="text-end">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td>
                            <div class="d-flex align-items-center">
                                <img th:src="${u.image != null and !#strings.isEmpty(u.image)} ? @{/uploads/{img}(img=${u.image})} : 'https://ui-avatars.com/api/?name=' + ${u.fullName}" class="user-avatar">
                                <div class="ms-3 fw-bold" th:text="${u.fullName}"></div>
                            </div>
                        </td>
                        <td th:text="${u.email}"></td>
                        <td th:text="${u.phone}"></td>
                        <td>
                            <span th:class="'badge-role ' + (${u.role} == 'admin' ? 'role-admin' : 'role-customer')" th:text="${u.role}">
                            </span>
                        </td>
                        <td class="text-end">
                            <button class="btn-action bg-light text-primary me-1" th:attr="onclick=|editUser(${u.id}, '${#strings.escapeJavaScript(u.fullName)}', '${#strings.escapeJavaScript(u.email)}', '${#strings.escapeJavaScript(u.phone != null ? u.phone : '')}', '${#strings.escapeJavaScript(u.role)}', '${#strings.escapeJavaScript(u.image != null ? u.image : '')}')|">✎</button>
                            <button class="btn-action bg-light text-danger" th:attr="onclick=|deleteUser(${u.id})|">🗑</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${totalPages > 1}" class="p-4 d-flex justify-content-end">
            <nav><ul class="pagination mb-0">
                <li th:each="i : ${#numbers.sequence(1, totalPages)}" th:class="${i == currentPage ? 'page-item active' : 'page-item'}">
                    <a class="page-link" th:href="@{/admin/users(page=${i}, q=${search})}" th:text="${i}">1</a>
                </li>
            </ul></nav>
        </div>
    </div>
</div>

<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 24px; border: none;">
            <div class="modal-header border-0 p-4 pb-0">
                <h5 class="fw-bold" id="modalTitle">Người dùng</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form method="POST" id="userForm" th:action="@{/admin/users}" enctype="multipart/form-data">
                    <input type="hidden" name="action" value="save">
                    <input type="hidden" name="user_id" id="userId">
                    <input type="hidden" name="current_image" id="currentImage">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Họ và tên</label>
                        <input type="text" name="full_name" id="userName" class="form-control rounded-3" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" name="email" id="userEmail" class="form-control rounded-3" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Mật khẩu</label>
                            <input type="password" name="password" id="userPass" class="form-control rounded-3" placeholder="Để trống nếu giữ nguyên">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Số điện thoại</label>
                            <input type="text" name="phone" id="userPhone" class="form-control rounded-3">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Vai trò</label>
                            <select name="role" id="userRole" class="form-select rounded-3">
                                <option value="customer">Customer</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Ảnh đại diện</label>
                        <input type="file" name="image" class="form-control rounded-3">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" style="background: var(--primary-color); border: none; border-radius: 12px;">Xác nhận</button>
                </form>
            </div>
        </div>
    </div>
</div>

<form id="delForm" th:action="@{/admin/users}" method="POST" style="display:none;">
    <input type="hidden" name="action" value="delete">
    <input type="hidden" name="id" id="delId">
</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const modal = new bootstrap.Modal(document.getElementById('userModal'));

    function openModal() {
        document.getElementById('modalTitle').innerText = 'Thêm tài khoản mới';
        document.getElementById('userForm').reset();
        document.getElementById('userId').value = '';
        
        // Mở khóa các trường khi thêm mới
        document.getElementById('userName').readOnly = false;
        document.getElementById('userEmail').readOnly = false;
        document.getElementById('userPhone').readOnly = false;
        document.getElementById('userPass').readOnly = false;
        document.getElementById('userPass').placeholder = "Nhập mật khẩu...";
        document.querySelector('input[name="image"]').disabled = false;
        
        modal.show();
    }

    function editUser(id, full_name, email, phone, role, image) {
        document.getElementById('modalTitle').innerText = 'Sửa vai trò tài khoản: ' + full_name;
        document.getElementById('userId').value = id;
        document.getElementById('userName').value = full_name;
        document.getElementById('userEmail').value = email;
        document.getElementById('userPhone').value = phone;
        document.getElementById('userRole').value = role;
        document.getElementById('currentImage').value = image;
        document.getElementById('userPass').value = '';
        document.getElementById('userPass').required = false;
        document.getElementById('userPass').placeholder = "Không được phép đổi mật khẩu";
        
        // Khóa các trường nhạy cảm khi edit
        document.getElementById('userName').readOnly = true;
        document.getElementById('userEmail').readOnly = true;
        document.getElementById('userPhone').readOnly = true;
        document.getElementById('userPass').readOnly = true;
        document.querySelector('input[name="image"]').disabled = true;

        modal.show();
    }

    function deleteUser(id) {
        Swal.fire({
            title: 'Xóa người dùng này?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc2626',
            confirmButtonText: 'Xóa',
            cancelButtonText: 'Hủy'
        }).then((result) => {
            if (result.isConfirmed) {
                document.getElementById('delId').value = id;
                document.getElementById('delForm').submit();
            }
        })
    }
</script>
<script th:inline="javascript">
    /*[# th:if="${message != null}"]*/
    Swal.fire({ icon: 'success', title: 'Thành công', text: /*[[${message}]]*/ '', timer: 1500, showConfirmButton: false });
    /*[/]*/
    /*[# th:if="${error != null}"]*/
    Swal.fire({ icon: 'error', title: 'Lỗi', text: /*[[${error}]]*/ '' });
    /*[/]*/
</script>
</body>
</html>
