<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý tin tức - GOAT HOTEL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        :root { --primary-color: #4e31aa; --bg-admin: #f8faff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-admin); }
        .main-wrapper { margin-left: 280px; padding: 40px; }
        .card-table { background: white; border-radius: 24px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.03); overflow: hidden; }
        .news-img { width: 80px; height: 50px; object-fit: cover; border-radius: 8px; }
        .ck-editor__editable { min-height: 300px !important; border-radius: 0 0 12px 12px !important; }
        .ck-toolbar { border-radius: 12px 12px 0 0 !important; }
        .ck-powered-by { display: none !important; }
        .pagination .page-link { border: none; border-radius: 8px; margin: 0 3px; color: var(--primary-color); }
        .pagination .active .page-link { background: var(--primary-color); color: white; }
    </style>
</head>
<body>

<div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

<div class="main-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1">Tin tức &amp; Sự kiện</h2>
            <p class="text-muted mb-0">Quản lý nội dung truyền thông khách sạn</p>
        </div>
        <button class="btn btn-primary px-4 py-2 rounded-3 fw-bold" style="background: var(--primary-color); border: none;" onclick="openModal()">+ Viết bài mới</button>
    </div>

    <div class="card-table">
        <div class="p-4 border-bottom">
            <form method="GET" th:action="@{/admin/news}" style="max-width: 350px;">
                <input type="text" name="q" class="form-control rounded-pill px-4" placeholder="Tìm tiêu đề..." th:value="${search}">
            </form>
        </div>
        <div class="table-responsive">
            <table class="table mb-0 px-4">
                <thead>
                    <tr>
                        <th class="ps-4 py-3">Ảnh</th>
                        <th class="py-3">Tiêu đề</th>
                        <th class="py-3">Ngày đăng</th>
                        <th class="text-end pe-4 py-3">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="n : ${newsList}">
                        <td class="ps-4 py-3">
                            <img th:src="${n.image != null and !#strings.isEmpty(n.image)} ? @{/uploads/{img}(img=${n.image})} : 'https://via.placeholder.com/80x50'" class="news-img">
                        </td>
                        <td class="fw-bold py-3" th:text="${n.title}"></td>
                        <td class="py-3" th:text="${#temporals.format(n.createdAt, 'dd/MM/yyyy')}"></td>
                        <td class="text-end pe-4 py-3">
                            <button class="btn btn-sm btn-light text-primary me-1" th:attr="onclick=|editNews(${n.id}, '${#strings.escapeJavaScript(n.title)}', '${#strings.escapeJavaScript(n.summary)}', '${#strings.escapeJavaScript(n.content != null ? n.content : '')}', '${#strings.escapeJavaScript(n.image != null ? n.image : '')}')|">✎</button>
                            <button class="btn btn-sm btn-light text-danger" th:attr="onclick=|deleteNews(${n.id})|">🗑</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${totalPages > 1}" class="p-4 d-flex justify-content-end">
            <nav><ul class="pagination mb-0">
                <li th:each="i : ${#numbers.sequence(1, totalPages)}" th:class="${i == currentPage ? 'page-item active' : 'page-item'}">
                    <a class="page-link" th:href="@{/admin/news(page=${i}, q=${search})}" th:text="${i}">1</a>
                </li>
            </ul></nav>
        </div>
    </div>
</div>

<div class="modal fade" id="newsModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content" style="border-radius: 24px;">
            <div class="modal-header border-0 p-4 pb-0">
                <h5 class="fw-bold" id="modalTitle">Bài viết</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form method="POST" id="newsForm" th:action="@{/admin/news}" enctype="multipart/form-data">
                    <input type="hidden" name="action" value="save">
                    <input type="hidden" name="news_id" id="newsId">
                    <input type="hidden" name="current_image" id="currentImage">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tiêu đề bài viết</label>
                        <input type="text" name="title" id="newsTitle" class="form-control rounded-3" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mô tả ngắn</label>
                        <textarea name="summary" id="newsSummary" class="form-control rounded-3" rows="2" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Ảnh bìa</label>
                        <input type="file" name="image" class="form-control rounded-3">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Nội dung chi tiết</label>
                        <textarea name="content" id="newsContent"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" style="background: var(--primary-color); border: none; border-radius: 12px;">Lưu bài viết</button>
                </form>
            </div>
        </div>
    </div>
</div>

<form id="delForm" th:action="@{/admin/news}" method="POST" style="display:none;">
    <input type="hidden" name="action" value="delete">
    <input type="hidden" name="id" id="delId">
</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>

<script>
    let editor;
    ClassicEditor.create(document.querySelector('#newsContent'), {
        toolbar: ['heading','|','bold','italic','link','bulletedList','numberedList','blockQuote','insertTable','undo','redo']
    }).then(newEditor => { editor = newEditor; });

    const modal = new bootstrap.Modal(document.getElementById('newsModal'));

    function openModal() {
        document.getElementById('modalTitle').innerText = 'Đăng tin mới';
        document.getElementById('newsForm').reset();
        document.getElementById('newsId').value = '';
        if(editor) editor.setData('');
        modal.show();
    }

    function editNews(id, title, summary, content, image) {
        document.getElementById('modalTitle').innerText = 'Chỉnh sửa bài viết';
        document.getElementById('newsId').value = id;
        document.getElementById('newsTitle').value = title;
        document.getElementById('newsSummary').value = summary;
        document.getElementById('currentImage').value = image;
        if(editor) editor.setData(content);
        modal.show();
    }

    function deleteNews(id) {
        Swal.fire({
            title: 'Xác nhận xóa?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc2626',
            confirmButtonText: 'Xóa'
        }).then((res) => {
            if (res.isConfirmed) {
                document.getElementById('delId').value = id;
                document.getElementById('delForm').submit();
            }
        });
    }

    document.getElementById('newsForm').onsubmit = function() {
        if(editor) document.getElementById('newsContent').value = editor.getData();
    };
</script>
<script th:inline="javascript">
    /*[# th:if="${message != null}"]*/
    Swal.fire({ icon: 'success', title: 'Thành công', text: /*[[${message}]]*/ '', timer: 1500, showConfirmButton: false });
    /*[/]*/
    /*[# th:if="${error != null}"]*/
    Swal.fire({ icon: 'error', title: 'Lỗi', text: /*[[${error}]]*/ '' });
    /*[/]*/
</script>
</body>
</html>
