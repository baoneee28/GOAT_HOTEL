# ==========================================
# Cấu hình kết nối SQL Server
# Cách dùng: Đổi tên file này thành application.properties
#            (hoặc chạy với tham số: --spring.profiles.active=sqlserver)
# ==========================================

# Thay "localhost" nếu SQL Server của bạn ở máy khác
# Thay "goat_hotel" nếu bạn đặt tên database khác trong file .sql
# ⚠️ Dùng Windows Authentication (theo cấu hình SSMS trong ảnh)
spring.datasource.url=${GOAT_DB_URL:jdbc:sqlserver://localhost;databaseName=goat_hotel;integratedSecurity=true;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${GOAT_DB_USERNAME:}
spring.datasource.password=${GOAT_DB_PASSWORD:}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==========================================
# JPA / Hibernate dialect cho SQL Server
# Schema duoc quan ly boi goat_hotel_sqlserver_full_setup.sql
# ==========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=true

# ==========================================
# Server
# ==========================================
server.port=8080

# ==========================================
# Thymeleaf
# ==========================================
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ==========================================
# File Upload
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload dir nam ngoai classpath de khong mat file khi build jar
app.upload.dir=uploads/
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ==========================================
# Session
# ==========================================
server.servlet.session.timeout=3600

# Seed demo data chi khi can reset mo phong admin dashboard
app.seed-demo-data=false
app.seed-maintenance-rooms=false
app.backfill-booking-prices-on-startup=false
app.backfill-room-type-specs-on-startup=false
