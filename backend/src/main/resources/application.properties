# ==========================================
# Database Configuration - SQL Server Authentication
# ⚠️ Bật SQL Server Auth trước: xem hướng dẫn bên dưới
spring.config.import=optional:file:./application-local.properties,optional:file:./backend/application-local.properties
spring.datasource.url=${GOAT_DB_URL:jdbc:sqlserver://localhost;databaseName=goat_hotel;integratedSecurity=true;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${GOAT_DB_USERNAME:}
spring.datasource.password=${GOAT_DB_PASSWORD:}

# ==========================================
# JPA / Hibernate (SQL Server)
# Schema duoc quan ly boi goat_hotel_sqlserver_full_setup.sql
# ==========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=true

# ==========================================
# Server
# ==========================================
server.port=8080

# ==========================================
# Thymeleaf
# ==========================================
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=file:../frontend/templates/
spring.thymeleaf.cache=false

# ==========================================
# File Upload (thay the PHP move_uploaded_file)
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# CẤU HÌNH UPLOADS
# ==========================================
# Upload dir nam ngoai classpath de khong mat file khi build jar
app.upload.dir=uploads/
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ==========================================
# Session (tuong duong PHP session)
# ==========================================
server.servlet.session.timeout=3600

# ==========================================
# BOOKING HOLD (LOCAL DEMO)
# ==========================================
# Dong bo giu cho booking pending va luong VNPay demo cung 1 chuan.
# Booking pending co hieu luc 60 giay (1 phut) de de demo expire flow nhanh hon.
booking.pending-hold-seconds=60
booking.deposit-ratio=0.3
app.seed-demo-data=false
app.seed-maintenance-rooms=false
app.backfill-booking-prices-on-startup=false
app.backfill-room-type-specs-on-startup=false

# ==========================================
# ERROR HANDLING (production-safe)
# ==========================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# ==========================================
# VNPAY CONFIGURATION (SANDBOX)
# ==========================================
# Cau hinh secret qua bien moi truong GOAT_VNP_TMNCODE / GOAT_VNP_HASH_SECRET
# Backend callback public qua ngrok, sau do backend redirect ve frontend local de hien thi ket qua.
vnp.tmnCode=${GOAT_VNP_TMNCODE:}
vnp.hashSecret=${GOAT_VNP_HASH_SECRET:}
vnp.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnp.returnUrl=https://uninsurable-unrepresentatively-celesta.ngrok-free.dev/api/vnpay/return
vnp.frontendReturnUrl=http://localhost:5173/vnpay-return
# IPN URL de dang ky/phoi hop voi VNPay neu can:
# https://uninsurable-unrepresentatively-celesta.ngrok-free.dev/api/vnpay/ipn

# ==========================================
# GMAIL SMTP (Forgot Password OTP)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GOAT_MAIL_USERNAME:}
spring.mail.password=${GOAT_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8
