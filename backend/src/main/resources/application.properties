# ==========================================
# Database Configuration - SQL Server Authentication
# ⚠️ Bật SQL Server Auth trước: xem hướng dẫn bên dưới
spring.datasource.url=jdbc:sqlserver://localhost;databaseName=goat_hotel;integratedSecurity=true;encrypt=true;trustServerCertificate=true

# ==========================================
# JPA / Hibernate (SQL Server)
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=true

# ==========================================
# Server
# ==========================================
server.port=8080

# ==========================================
# Thymeleaf
# ==========================================
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ==========================================
# File Upload (thay the PHP move_uploaded_file)
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# CẤU HÌNH TÁCH FRONTEND VÀ BACKEND THÀNH 2 THƯ MỤC
# ==========================================
spring.thymeleaf.prefix=file:../frontend/templates/
spring.web.resources.static-locations=file:../frontend/static/
spring.thymeleaf.cache=false

# Upload directory (Bây giờ nó nằm ở frontend bên ngoài)
app.upload.dir=../frontend/static/uploads/

# ==========================================
# Session (tuong duong PHP session)
# ==========================================
server.servlet.session.timeout=3600

# ==========================================
# BOOKING HOLD (LOCAL DEMO)
# ==========================================
# Demo local de ban nhin timeout de dang hon.
# Khi chot nghiep vu cho ban that, doi lai 180 giay (3 phut).
booking.pending-hold-seconds=45

# ==========================================
# DEBUG ERRORS
# ==========================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true

