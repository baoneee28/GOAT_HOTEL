<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân - GOAT HOTEL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-color: #4e31aa;
            --secondary-color: #8b5cf6;
            --accent-color: #f7a400;
            --bg-body: #f8faff;
            --text-dark: #1e293b;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); color: var(--text-dark); }

        /* Navbar CSS tu header.php */
        .navbar { background: rgba(255,255,255,0.95); padding: 18px 0; box-shadow: 0 4px 30px rgba(0,0,0,0.03); backdrop-filter: blur(10px); transition: all 0.3s; }
        .navbar-brand { color: var(--primary-color) !important; font-weight: 800; font-size: 1.6rem; letter-spacing: -0.5px; text-transform: uppercase; background: linear-gradient(45deg, var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-link { color: #64748b !important; font-weight: 600; padding: 8px 20px !important; transition: all 0.3s; border-radius: 50px; }
        .nav-link:hover { color: var(--primary-color) !important; background: rgba(78,49,170,0.05); }
        .user-avatar-nav { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid #e0e7ff; }
        .user-dropdown { position: relative; }
        .user-dropdown .dropdown-menu { display: none; position: absolute; right: 0; top: 120%; border: none; box-shadow: 0 20px 40px rgba(0,0,0,0.08); border-radius: 20px; padding: 15px; min-width: 220px; background: #fff; z-index: 1050; }
        .user-dropdown:hover .dropdown-menu { display: block; top: 100%; }
        .dropdown-item { border-radius: 12px; padding: 12px 15px; font-weight: 600; color: #475569; transition: 0.2s; }
        .dropdown-item:hover { background: #f1f5f9; color: var(--primary-color); transform: translateX(5px); }
        .dropdown-divider { margin: 10px 0; border-top: 1px solid #f1f5f9; }
        .btn-login { background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%); color: white !important; padding: 12px 30px; border-radius: 50px; font-weight: 700; box-shadow: 0 10px 20px rgba(78,49,170,0.2); border: none; }

        /* CSS giu nguyen 100% tu profile.php */
        .profile-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            border: 1px solid #f1f5f9;
            overflow: hidden;
        }
        .avatar-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
        }
        .profile-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .avatar-upload-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--primary-color);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            border: 3px solid white;
        }
        .avatar-upload-btn:hover {
            background: #3b2585;
            transform: scale(1.1);
        }
        .nav-pills-custom .nav-link {
            color: #64748b;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 12px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-pills-custom .nav-link:hover {
            background: #f8faff;
            color: var(--primary-color);
        }
        .nav-pills-custom .nav-link.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 5px 15px rgba(78, 49, 170, 0.2);
        }
        .form-control-custom {
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            padding: 12px 15px;
            font-weight: 500;
            transition: 0.3s;
        }
        .form-control-custom:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(78, 49, 170, 0.1);
        }
        .form-label {
            font-weight: 700;
            color: #334155;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>


<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">GOAT HOTEL</a>
        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto align-items-center">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Trang chủ</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/#booking-section}">Đặt phòng</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/#newsCarousel}">Tin tức</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Liên hệ</a></li>
            </ul>
            <ul class="navbar-nav align-items-center mt-3 mt-lg-0">
                <li th:if="${session.user != null}" class="nav-item user-dropdown ms-lg-3">
                    <a class="nav-link p-0 d-flex align-items-center gap-3" href="#">
                        <span class="text-end d-none d-lg-block">
                            <small class="d-block text-muted" style="font-size: 0.75rem; line-height: 1;">Xin chào,</small>
                            <span class="fw-bold text-dark" th:text="${session.user.fullName}">Khách</span>
                        </span>
                        <img th:if="${session.user.image != null and !session.user.image.isEmpty()}"
                             th:src="@{/uploads/} + ${session.user.image}" class="user-avatar-nav" alt="avatar">
                        <img th:unless="${session.user.image != null and !session.user.image.isEmpty()}"
                             th:src="@{'https://ui-avatars.com/api/?background=4e31aa&color=fff&size=128&name=' + ${session.user.fullName}}"
                             class="user-avatar-nav" alt="avatar">
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/profile}">👤 Hồ sơ cá nhân</a></li>
                        <li><a class="dropdown-item" th:href="@{/history}">📅 Lịch sử đặt phòng</a></li>
                        <li><div class="dropdown-divider"></div></li>
                        <li><a class="dropdown-item text-danger" th:href="@{/logout}">🚪 Đăng xuất</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>


<div class="container my-5 pt-4">
    <div class="row g-4">
        
        <div class="col-lg-4">
            <div class="profile-card p-4 text-center">
                
                <form method="POST" enctype="multipart/form-data" id="avatarForm">
                    <div class="avatar-wrapper">
                        
                        <img th:if="${session.user.image != null and !session.user.image.isEmpty()}"
                             th:src="@{/uploads/} + ${session.user.image}"
                             class="profile-avatar" id="avatarPreview">
                        <img th:unless="${session.user.image != null and !session.user.image.isEmpty()}"
                             th:src="@{'https://ui-avatars.com/api/?background=4e31aa&color=fff&size=150&name=' + ${session.user.fullName}}"
                             class="profile-avatar" id="avatarPreview">
                        
                        <label for="avatarInput" class="avatar-upload-btn">
                            <i class="bi bi-camera-fill"></i>
                        </label>
                        
                        <input type="file" name="avatar" id="avatarInput" hidden accept="image/*" onchange="previewImage(this)">
                    </div>
                </form>

                
                <h4 class="fw-bold mb-1" th:text="${session.user.fullName}">Tên</h4>
                <p class="text-muted mb-4" th:text="${session.user.email}">email</p>

                
                <div class="nav flex-column nav-pills-custom text-start">
                    <a th:href="@{/profile}" class="nav-link active">
                        <i class="bi bi-person-gear"></i> Thông tin tài khoản
                    </a>
                    <a th:href="@{/history}" class="nav-link">
                        <i class="bi bi-clock-history"></i> Lịch sử đặt phòng
                    </a>
                    <a th:href="@{/logout}" class="nav-link text-danger">
                        <i class="bi bi-box-arrow-right"></i> Đăng xuất
                    </a>
                </div>
            </div>
        </div>

        
        <div class="col-lg-8">
            <div class="profile-card p-4 p-md-5">
                <h4 class="fw-bold mb-4" style="color: var(--primary-color);">Cập nhật thông tin</h4>

                
                
                <form th:action="@{/profile}" method="POST" enctype="multipart/form-data">
                    
                    <input type="file" name="avatar" id="realAvatarInput" hidden>

                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label">Họ và tên</label>
                            
                            <input type="text" name="full_name" class="form-control form-control-custom"
                                   th:value="${session.user.fullName}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Số điện thoại</label>
                            
                            <input type="text" name="phone" class="form-control form-control-custom"
                                   th:value="${session.user.phone}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Địa chỉ Email</label>
                            
                            <input type="email" class="form-control form-control-custom bg-light"
                                   th:value="${session.user.email}" readonly>
                            <small class="text-muted ms-1"><i class="bi bi-info-circle"></i> Email không thể thay đổi</small>
                        </div>
                        <div class="col-12 mt-4">
                            
                            <button type="submit" name="update_profile" class="btn btn-primary rounded-pill px-5 py-3 fw-bold shadow-sm">
                                Lưu thay đổi
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    // Tuong duong PHP function previewImage - giu nguyen logic DataTransfer
    function previewImage(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('avatarPreview').src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);

            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(input.files[0]);
            document.getElementById('realAvatarInput').files = dataTransfer.files;
        }
    }
</script>

<script th:inline="javascript">
    /*[# th:if="${alert_icon != null}"]*/
    Swal.fire({
        icon: /*[[${alert_icon}]]*/ 'info',
        title: /*[[${alert_title}]]*/ '',
        text: /*[[${alert_text}]]*/ '',
        confirmButtonColor: '#4e31aa',
        timer: 2000
    });
    /*[/]*/
</script>
</body>
</html>
