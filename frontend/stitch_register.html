<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .floating-label-group {
            position: relative;
            margin-bottom: 2.5rem;
        }
        .floating-label-group input {
            padding: 0.75rem 0;
            display: block;
            width: 100%;
            border: none;
            border-bottom: 1px solid rgba(196, 199, 199, 0.4);
            background: transparent;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        .floating-label-group input:focus {
            outline: none;
            border-bottom: 1px solid #000000;
            ring: 0;
        }
        .floating-label-group label {
            position: absolute;
            pointer-events: none;
            left: 0;
            top: 0.75rem;
            transition: 0.2s ease all;
            color: #858383;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
        }
        .floating-label-group input:focus ~ label,
        .floating-label-group input:not(:placeholder-shown) ~ label {
            top: -1.25rem;
            font-size: 0.65rem;
            color: #000000;
        }
        .glass-panel {
            background: rgba(248, 249, 250, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface font-body text-on-surface antialiased overflow-x-hidden">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-white dark:bg-stone-950 bg-stone-100/10 backdrop-blur-md flex items-center justify-between px-6 h-20 w-full">

</div>
<div class="font-['Manrope'] tracking-[0.2em] uppercase text-xl font-bold text-stone-900 dark:text-stone-50">

        </div>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</header>
<main class="min-h-screen flex flex-col md:flex-row">
<!-- Visual Column (Asymmetric Hero) -->
<section class="hidden md:block md:w-5/12 lg:w-1/2 relative h-screen overflow-hidden">
<img alt="Luxury Hotel Lobby" class="absolute inset-0 w-full h-full object-cover" data-alt="Minimalist luxury hotel lobby with high ceilings, beige marble floors, a single sculptural olive tree, and soft natural sunlight filtering through sheer drapes" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAp_YGgWWZANBmtdcbLCGXenLY_V6yUu-NPq1ov6fBTRNEPmCtBVg0SRWNDsh10vOy__kup40aD9gfvN2XhE_h3sjX9epbqVgu2HgiB_BBz_PjRqtd3QJmocEFyd-fkspEy8sJrKtH68S62KhOAnJPTUjhGSgQXboFLr16NAGZFIyBPWgWuoC6pVWve2TXtLV1RjyK3gkizHP2hEdJEjFJHkAeOlXMCYCNT0syHtDvMA9vyZSoXG5VyU2CcOfOTR8u06ra4sklTQpwN"/>

<div class="absolute bottom-20 left-12 max-w-sm z-10">
<p class="font-headline text-white text-4xl font-extrabold tracking-[-0.04em] leading-tight">
                    A SANCTUARY <br/>OF REFINED <br/>SIMPLICITY.
                </p>
<div class="h-px w-12 bg-white/50 mt-6"></div>
</div>
</section>
<!-- Registration Form Column -->
<section class="flex-1 flex items-center justify-center px-8 pt-32 pb-20 md:pt-20">
<div class="w-full max-w-md">
<header class="mb-16">
<span class="text-secondary font-label text-[10px] tracking-[0.2em] uppercase block mb-4">Membership</span>
<h1 class="font-headline text-5xl font-extrabold tracking-[-0.04em] text-primary mb-2">Create Account</h1>
<p class="text-on-surface-variant font-body font-light text-lg">Join the collective of global curators.</p>
</header>
<form class="space-y-2">
<!-- Floating Label Inputs -->
<div class="floating-label-group">
<input id="fullname" name="fullname" placeholder=" " required="" type="text"/>
<label for="fullname">Full Name</label>
</div>
<div class="floating-label-group">
<input id="email" name="email" placeholder=" " required="" type="email"/>
<label for="email">Email Address</label>
</div>
<div class="floating-label-group">
<input id="password" name="password" placeholder=" " required="" type="password"/>
<label for="password">Password</label>
</div>
<div class="floating-label-group">
<input id="confirm_password" name="confirm_password" placeholder=" " required="" type="password"/>
<label for="confirm_password">Confirm Password</label>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 py-4 mb-8">
<input class="mt-1 rounded-sm border-outline-variant text-primary focus:ring-0 focus:ring-offset-0 transition-colors cursor-pointer" id="terms" type="checkbox"/>
<label class="text-xs text-on-surface-variant font-light leading-relaxed" for="terms">
                            I agree to the <a class="text-primary font-medium hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-medium hover:underline" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- Action Buttons -->
<button class="w-full py-5 bg-primary text-on-primary rounded-xl font-label text-xs tracking-[0.2em] uppercase font-semibold transition-all hover:opacity-90 active:scale-[0.98] duration-200 shadow-xl shadow-primary/10" type="submit">
                        Đăng ký tài khoản
                    </button>
<div class="pt-8 text-center">
<p class="text-sm text-on-surface-variant font-light">
                            Already a member? 
                            <a class="text-secondary font-semibold ml-2 hover:underline transition-all" href="#">Đăng nhập</a>
</p>
</div>
</form>
<!-- Social Proof / Footer Note -->

<div class="flex items-center gap-6">
<div class="flex -space-x-3">

<img class="w-8 h-8 rounded-full border-2 border-surface" data-alt="Portrait of an elegant woman smiling" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBwH7BQQYIdbqMKpqgxQyEuTgpJLar8YOU9IqoTQfSvAv8hBIDwdFyebdmaYct3WpUUf6E6UFe0ut5tR98WDwjIkp81SI5gUcA4v-alkNXXXSatklGoOp9vICEXCCxmOTc5iFgXRhVY6tZNTPgxACnIkuqdnS67yaTXuvMXUETzqOpF0P1PyVDI2saSyvrdzXmkuDuI_hR1xCfgp_nGOcoCTjymNIYsWlqHTwnFlOsI6Dw5FTyzLhS7pX5m7yid3ez6Dg9K_ek4UGuM"/>
</div>
<p class="text-[10px] text-on-surface-variant uppercase tracking-widest font-medium">
                            Joined by 2k+ curated guests
                        </p>
</div>
</div>
</div>
</section>
</main>

<footer class="bg-stone-50 dark:bg-stone-950 w-full border-t border-stone-200/20 flex flex-col md:flex-row justify-between items-center px-10 py-12 gap-6">
<div class="font-['Inter'] text-[10px] tracking-widest uppercase text-stone-400 dark:text-stone-500">
            © 2024 GOAT HOTEL. ALL RIGHTS RESERVED.
        </div>
<div class="flex gap-8">
<a class="font-['Inter'] text-[10px] tracking-widest uppercase text-stone-400 dark:text-stone-500 hover:text-stone-600 dark:hover:text-stone-300 transition-colors" href="#">Privacy</a>
<a class="font-['Inter'] text-[10px] tracking-widest uppercase text-stone-400 dark:text-stone-500 hover:text-stone-600 dark:hover:text-stone-300 transition-colors" href="#">Terms</a>
<a class="font-['Inter'] text-[10px] tracking-widest uppercase text-stone-400 dark:text-stone-500 hover:text-stone-600 dark:hover:text-stone-300 transition-colors" href="#">Concierge</a>
