<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - GOAT HOTEL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --primary-color: #4e31aa; --accent-color: #f7a400; --bg-admin: #f8faff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-admin); }
        .main-wrapper { margin-left: 280px; padding: 40px; }
        .stat-box { background: white; border-radius: 24px; padding: 25px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.03); height: 100%; transition: 0.3s; }
        .stat-box:hover { transform: translateY(-5px); }
        .chart-container { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-top: 30px; }
        .welcome-card { background: linear-gradient(135deg, #4e31aa 0%, #8b5cf6 100%); color: white; border-radius: 24px; padding: 35px; margin-bottom: 30px; box-shadow: 0 15px 35px rgba(78,49,170,0.2); position: relative; overflow: hidden; }
        .icon-box { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 15px; }
        #realtime-clock { font-size: 2.5rem; font-weight: 800; opacity: 0.2; position: absolute; right: 30px; top: 50%; transform: translateY(-50%); letter-spacing: 2px; pointer-events: none; }
    </style>
</head>
<body>


<div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>


<div class="main-wrapper">
    
    <div class="welcome-card d-flex justify-content-between align-items-center">
        <div style="z-index: 2;">
            
            <h2 class="fw-bold mb-2">Xin chào, <span th:text="${session.user.fullName}">Admin</span>! 👋</h2>
            
            <p class="mb-0 opacity-75">Hệ thống đang hoạt động ổn định. Bạn có <b th:text="${pending_count}">0</b> đơn đặt phòng cần duyệt.</p>
        </div>
        
        <div id="realtime-clock">00:00:00</div>
    </div>

    
    <div class="row g-4">
        <div class="col-md-3">
            <div class="stat-box">
                <div class="icon-box bg-success-subtle text-success">💰</div>
                <div class="small text-muted mb-1 text-uppercase fw-bold">Tổng doanh thu</div>
                
                <h3 class="fw-bold mb-0">
                    <span th:text="${#numbers.formatInteger(total_revenue, 1, 'COMMA')}">0</span>đ
                </h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-box">
                <div class="icon-box bg-info-subtle text-info">👥</div>
                <div class="small text-muted mb-1 text-uppercase fw-bold">Khách hàng</div>
                
                <h3 class="fw-bold mb-0" th:text="${#numbers.formatInteger(total_customers, 1, 'COMMA')}">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-box">
                <div class="icon-box bg-primary-subtle text-primary">🏣</div>
                <div class="small text-muted mb-1 text-uppercase fw-bold">Tổng số phòng</div>
                
                <h3 class="fw-bold mb-0"><span th:text="${total_rooms}">0</span> Phòng</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-box">
                <div class="icon-box bg-warning-subtle text-warning">⏳</div>
                <div class="small text-muted mb-1 text-uppercase fw-bold">Chờ xử lý</div>
                
                <h3 class="fw-bold mb-0"><span th:text="${pending_count}">0</span> Đơn</h3>
            </div>
        </div>
    </div>

    
    <div class="row">
        <div class="col-lg-8">
            <div class="chart-container h-100">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold mb-0">Biểu đồ doanh thu tuần</h5>
                    <span class="badge bg-light text-dark border">Static Data</span>
                </div>
                <div style="height: 180px; position: relative;">
                    <canvas id="waveChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="chart-container h-100">
                <h5 class="fw-bold mb-3">Trạng thái phòng</h5>
                <div style="position: relative; height: 160px;">
                    <canvas id="pieChart"></canvas>
                </div>
                
                <div class="mt-2 text-center small text-muted">
                    <span class="mx-2">● Trống: <span th:text="${s_available}">0</span></span>
                    <span class="mx-2">● Có khách: <span th:text="${s_booked}">0</span></span>
                </div>
            </div>
        </div>
    </div>
</div>


<script th:inline="javascript">
// Tuong duong PHP: setInterval updateClock
function updateClock() {
    const now = new Date();
    const timeString = now.toLocaleTimeString('vi-VN', { hour12: false });
    document.getElementById('realtime-clock').innerText = timeString;
}
setInterval(updateClock, 1000);
updateClock();

// Tuong duong PHP: json_encode($chart_labels) va json_encode($chart_data)
// Dung static data nhu PHP goc
const waveCtx = document.getElementById('waveChart').getContext('2d');
new Chart(waveCtx, {
    type: 'line',
    data: {
        labels: /*[[${chart_labels}]]*/ [],
        datasets: [{
            label: 'Doanh thu',
            data: [ [[${chart_data[0]}]], [[${chart_data[1]}]], [[${chart_data[2]}]], [[${chart_data[3]}]], [[${chart_data[4]}]], [[${chart_data[5]}]], [[${chart_data[6]}]] ],
            borderColor: '#4e31aa',
            backgroundColor: 'rgba(78, 49, 170, 0.1)',
            fill: true,
            tension: 0.4,
            pointRadius: 3,
            pointBackgroundColor: '#fff',
            pointBorderColor: '#4e31aa',
            pointBorderWidth: 2,
            borderWidth: 2
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
            y: {
                beginAtZero: true,
                grid: { borderDash: [5, 5] },
                ticks: {
                    font: { size: 10 },
                    callback: function(value) { return (value/1000000).toFixed(1) + 'M'; }
                }
            },
            x: {
                grid: { display: false },
                ticks: { font: { size: 10 } }
            }
        },
        interaction: { intersect: false, mode: 'index' }
    }
});

// Tuong duong PHP: $s_available, $s_booked, $s_maintenance
const pieCtx = document.getElementById('pieChart').getContext('2d');
new Chart(pieCtx, {
    type: 'doughnut',
    data: {
        labels: ['Phòng trống', 'Đang có khách', 'Bảo trì'],
        datasets: [{
            data: [ [[${s_available}]], [[${s_booked}]], [[${s_maintenance}]] ],
            backgroundColor: ['#22c55e', '#ef4444', '#94a3b8'],
            borderWidth: 0,
            hoverOffset: 10
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '70%',
        plugins: {
            legend: { position: 'right', labels: { boxWidth: 12, font: { size: 11 } } }
        }
    }
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
